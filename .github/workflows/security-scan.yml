name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [., frontend, backend, e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # --omit=dev: dev-only vulnerabilities (e.g. esbuild's dev-server CORS
      # issue pulled in transitively by vitest) never ship to production —
      # auditing only what actually gets deployed avoids false-positive
      # failures from tooling that's never exposed at runtime.
      - name: npm audit
        working-directory: ${{ matrix.dir }}
        run: npm audit --omit=dev --audit-level=high

  tfsec:
    name: tfsec (Terraform security scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -sSL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
          tfsec --version

      - name: Run tfsec
        run: tfsec terraform/ --minimum-severity HIGH
