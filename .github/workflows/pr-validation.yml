name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_ENV: pr-validation
          VITE_WS_ENDPOINT: wss://placeholder.invalid/pr-validation

  backend:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.7'
          terraform_wrapper: false

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      # bootstrap and envs/sandbox are separate root modules with their own
      # state/backend config — validate each independently with the backend
      # disabled, matching the local validation convention in CLAUDE.md.
      - name: Validate bootstrap
        working-directory: terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate envs/sandbox
        working-directory: terraform/envs/sandbox
        run: |
          terraform init -backend=false
          terraform validate
