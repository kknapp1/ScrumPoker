name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit message lint
    runs-on: ubuntu-latest
    # Dependabot's auto-generated commit messages ("Bump x from y to z")
    # don't follow Conventional Commits and never will — that's not a
    # signal of anything wrong with the dependency bump itself, so don't
    # block/fail Dependabot PRs on it. Real regressions from the bump
    # (lint/test/build failures) still fail via the other jobs below,
    # which run unconditionally for every PR including Dependabot's.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_ENV: pr-validation
          VITE_WS_ENDPOINT: wss://placeholder.invalid/pr-validation

  backend:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Unit tests
        working-directory: backend
        run: npm test

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'
          terraform_wrapper: false

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      # bootstrap and envs/sandbox are separate root modules with their own
      # state/backend config — validate each independently with the backend
      # disabled, matching the local validation convention in CLAUDE.md.
      - name: Validate bootstrap
        working-directory: terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate envs/sandbox
        working-directory: terraform/envs/sandbox
        run: |
          terraform init -backend=false
          terraform validate
