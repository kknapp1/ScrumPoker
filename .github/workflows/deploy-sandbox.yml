name: Deploy to Sandbox

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual triggers

permissions:
  contents: read
  id-token: write  # required for OIDC auth with AWS

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: sandbox
    outputs:
      cf_domain: ${{ steps.tf_outputs.outputs.cf_domain }}
      ws_endpoint: ${{ steps.tf_outputs.outputs.ws_endpoint }}
    env:
      # Set per-environment in GitHub: Settings > Environments > sandbox > Variables.
      # Value is the `bucket_name` output from terraform/bootstrap for this AWS account.
      SCRUM_POKER_BUCKET: ${{ vars.SCRUM_POKER_BUCKET }}
      TF_VAR_bucket_name: ${{ vars.SCRUM_POKER_BUCKET }}
      # Value is the `application_tag` output from terraform/bootstrap (a JSON
      # object, e.g. {"awsApplication":"arn:..."}) for this account — associates
      # every resource here with the scrum-poker AppRegistry Application.
      TF_VAR_application_tag: ${{ vars.SCRUM_POKER_APPLICATION_TAG }}

    steps:
      # ── Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      # ── Backend deps (bundled into the Lambda zip by Terraform's
      # archive_file at apply time — must be on disk before Terraform runs) ──
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      # ── Terraform — runs BEFORE the frontend build, since the frontend
      # needs the API Gateway WebSocket URL (an apply-time output) baked in
      # at Vite build time via VITE_WS_ENDPOINT. ──────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/envs/sandbox
        run: terraform init -backend-config="bucket=${{ env.SCRUM_POKER_BUCKET }}"

      - name: Terraform Validate
        working-directory: terraform/envs/sandbox
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/envs/sandbox
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/envs/sandbox
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform outputs
        id: tf_outputs
        working-directory: terraform/envs/sandbox
        run: |
          echo "bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "key_prefix=$(terraform output -raw frontend_key_prefix)" >> $GITHUB_OUTPUT
          echo "builds_bucket=$(terraform output -raw builds_bucket)" >> $GITHUB_OUTPUT
          echo "builds_prefix=$(terraform output -raw builds_prefix)" >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "cf_domain=$(terraform output -raw cloudfront_domain)" >> $GITHUB_OUTPUT
          echo "ws_endpoint=$(terraform output -raw websocket_endpoint)" >> $GITHUB_OUTPUT

      # ── Frontend build — now after Terraform apply, so the real
      # WebSocket endpoint is known and gets baked into the Vite build. ───
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_ENV: sandbox
          VITE_WS_ENDPOINT: ${{ steps.tf_outputs.outputs.ws_endpoint }}

      # ── Stage build artifact ───────────────────────────────────
      - name: Package build artifact
        working-directory: frontend/dist
        run: zip -r "../../build-${{ github.sha }}.zip" .

      - name: Upload build artifact
        run: |
          aws s3 cp "build-${{ github.sha }}.zip" \
            "s3://${{ env.SCRUM_POKER_BUCKET }}/builds/${{ github.sha }}.zip"

      # ── Release: fetch staged artifact and deploy to S3 ───────
      - name: Fetch and extract build artifact
        run: |
          aws s3 cp \
            "s3://${{ steps.tf_outputs.outputs.builds_bucket }}/${{ steps.tf_outputs.outputs.builds_prefix }}/${{ github.sha }}.zip" \
            release.zip
          mkdir release
          unzip -q release.zip -d release

      - name: Sync frontend to S3
        run: |
          DEST="s3://${{ steps.tf_outputs.outputs.bucket }}/${{ steps.tf_outputs.outputs.key_prefix }}"

          # Upload assets with long-lived cache (they are fingerprinted by Vite)
          aws s3 sync release/assets "$DEST/assets" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # Upload everything else with short cache
          aws s3 sync release "$DEST" \
            --cache-control "public, max-age=60" \
            --exclude "assets/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cf_id }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "### ✅ Sandbox deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${{ steps.tf_outputs.outputs.cf_domain }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # Runs after a successful deploy, against the real live stack. Failures
  # here are a visible signal (red X / step summary) for follow-up — not
  # wired to any rollback automation, since the deploy this validates has
  # already completed by the time these run.
  post-deploy-tests:
    name: Post-deploy functional tests
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: API functional tests
        working-directory: e2e
        env:
          WS_ENDPOINT: ${{ needs.deploy.outputs.ws_endpoint }}
        run: npm run test:api

      - name: UI functional tests
        working-directory: e2e
        env:
          BASE_URL: https://${{ needs.deploy.outputs.cf_domain }}
        run: npm run test:ui

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
